<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Audiowide", sans-serif;
            font-weight: 400;
            font-style: normal;
            background: linear-gradient(135deg, #373B44 0%, #4286f4 100%);
            color: white;
            margin: 0;
            justify-content: center;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        .profile-card {
            display: flex;
            align-items: center;
            padding: 30px;
            gap: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        .profile-card:hover {
            transform: scale(1.02);
        }
        #hari-image {
            width: 200px;
            height: auto;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateX(-50px);
            animation: slideIn 1.3s ease-out forwards;
        }
        .info-container{
            text-align: left;
            opacity: 0;
            transform: translateX(50px); 
            animation: slideIn 1.3s ease-out forwards;
            animation-delay: 0.3s;
        }
        .info-hari {
            margin: 15px 0;
            font-size: 1.1rem;
        }
        .label {
            color: #4ecca3;
            margin-right: 10px;
        }
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
   <div class="profile-card">
        <img src="images/Harichand.jpg" alt="Harichand" id="hari-image">

        <div class="info-container">
            <div class="info-hari">
                <span class="label">Name:</span>
                <span class="value">Harichand D Sabu</span>
            </div>
            <div class="info-hari">
                <span class="label">Age:</span>
                <span class="value">18</span>
            </div>
            <div class="info-hari">
                <span class="label">Date of Birth:</span>
                <span class="value">Dounno</span>
            </div>
            <div class="info-hari">
                <span class="label">Relationship Status:</span>
                <span class="value">💝Committed💝</span>
            </div>
            <div class="info-hari">
                <span class="label">Report:</span>
                <span class="value">Maybe Committed some Crime (Chances are Less)</span>
            </div>
        </div>
    </div>
</body> 
</html>
